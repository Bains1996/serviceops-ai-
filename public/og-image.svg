<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050816"/>
      <stop offset="0.5" stop-color="#0A0E27"/>
      <stop offset="1" stop-color="#111638"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00D4FF"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="orb1" cx="0.2" cy="0.3" r="0.4">
      <stop offset="0" stop-color="#00D4FF" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0.8" cy="0.7" r="0.35">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Orbs -->
  <rect width="1200" height="630" fill="url(#orb1)"/>
  <rect width="1200" height="630" fill="url(#orb2)"/>
  <!-- Grid lines -->
  <g opacity="0.05" stroke="#00D4FF" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Logo icon -->
  <rect x="100" y="240" width="80" height="80" rx="20" fill="url(#accent)"/>
  <text x="140" y="290" font-family="sans-serif" font-size="40" fill="white" text-anchor="middle" font-weight="bold">AI</text>
  <!-- Title -->
  <text x="220" y="270" font-family="sans-serif" font-size="56" fill="white" font-weight="800" letter-spacing="-2">ServiceOps AI</text>
  <text x="220" y="310" font-family="sans-serif" font-size="20" fill="#94A3B8" font-weight="500">Approval-First AI for Trucking Carriers</text>
  <!-- Feature pills -->
  <g transform="translate(100, 380)">
    <rect width="160" height="40" rx="10" fill="#00D4FF" fill-opacity="0.1" stroke="#00D4FF" stroke-opacity="0.3"/>
    <text x="80" y="25" font-family="sans-serif" font-size="14" fill="#00D4FF" text-anchor="middle" font-weight="600">AI Dispatch</text>
  </g>
  <g transform="translate(280, 380)">
    <rect width="180" height="40" rx="10" fill="#7C3AED" fill-opacity="0.1" stroke="#7C3AED" stroke-opacity="0.3"/>
    <text x="90" y="25" font-family="sans-serif" font-size="14" fill="#7C3AED" text-anchor="middle" font-weight="600">Automated Billing</text>
  </g>
  <g transform="translate(480, 380)">
    <rect width="170" height="40" rx="10" fill="#FFB800" fill-opacity="0.1" stroke="#FFB800" stroke-opacity="0.3"/>
    <text x="85" y="25" font-family="sans-serif" font-size="14" fill="#FFB800" text-anchor="middle" font-weight="600">Real-time GPS</text>
  </g>
  <g transform="translate(670, 380)">
    <rect width="200" height="40" rx="10" fill="#00C48C" fill-opacity="0.1" stroke="#00C48C" stroke-opacity="0.3"/>
    <text x="100" y="25" font-family="sans-serif" font-size="14" fill="#00C48C" text-anchor="middle" font-weight="600">Driver Communication</text>
  </g>
  <!-- Bottom text -->
  <text x="600" y="560" font-family="sans-serif" font-size="16" fill="#64748B" text-anchor="middle">serviceops.ai</text>
</svg>
